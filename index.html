<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=Lexend+Deca:wght@500&family=Lora&family=Noto+Sans+Display:wght@400;700&family=Playfair+Display&family=Spline+Sans+Mono&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="./css/style.css">
    <title>Joyas Aureom</title>
</head>

<body>
    <header class="header">
        <nav class="navbar" id="navbar"></nav>  
    </header>
<main>
    <div class="searchsection">
        <h2 class="searchtitle">BUSQUEDA</h2>
        <input type="text" id="searchName">
        <button onclick="filterProducts()">Buscar</button>
    </div>
    <div class="materialType" id="materialType"></div>

    <div class="cards" id="container">
        <div class="gold" id="gold"></div>
        <div class="silver" id="silver"></div>
    </div>
    
    <div class="titleheader" id="titleItems"></div>
    <ul class="listing" id="productList"></ul>
    <p class="total">Total: $<span id="totalAmount">0</span></p>

    <div class="derivation" id="derivation"></div>
    <div class="derivation" id="emptyCart"></div>

</main>

    <script src="./js/main.js"></script>
    <script type="module" src="./js/navbar.js"></script>
    <script type="module" src="./db/productsGold.json"></script>
    <script type="module" src="./db/productsSilver.json"></script>
</body>
</html>
